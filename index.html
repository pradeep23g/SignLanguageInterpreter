<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignSense AI - Live Interpreter</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
        }
        
        h1 { margin-bottom: 5px; color: #fbbf24; text-transform: uppercase; letter-spacing: 2px;}
        #status-banner { font-size: 0.9rem; color: #f59e0b; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }

        #video-container { 
            position: relative; 
            border: 4px solid #38bdf8; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }
        
        video, canvas { transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; }
        
        #chat-container {
            width: 640px;
            height: 250px;
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 15px;
            margin-top: 25px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .chat-bubble {
            background: linear-gradient(135deg, #ea580c, #c2410c);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            width: fit-content;
            font-weight: 800;
            font-size: 1.4rem;
            align-self: flex-start;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    <h1>SignSense Deep Learning Engine</h1>
    <div id="status-banner">🟡 Connecting to LSTM Server...</div>

    <div id="video-container">
        <video id="input_video" width="640px" height="480px"></video>
        <canvas id="output_canvas" width="640px" height="480px"></canvas>
    </div>
    
    <div id="chat-container"></div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const chatContainer = document.getElementById('chat-container');
        const statusBanner = document.getElementById('status-banner');
        
        let lastPrediction = "";
        let predictionTimeout;

        // 1. WebSocket Setup (Use 127.0.0.1 for maximum stability)
        const socket = new WebSocket('ws://127.0.0.1:8000/ws');
        
        socket.onopen = () => {
            statusBanner.innerText = "🟢 LSTM WEBSOCKET CONNECTED";
            statusBanner.style.color = "#10b981";
        };

        socket.onclose = () => {
            statusBanner.innerText = "🔴 WEBSOCKET DISCONNECTED. Check Uvicorn.";
            statusBanner.style.color = "#ef4444";
        };

        // 2. Chat UI & Voice synthesis
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if(data.prediction && data.prediction !== lastPrediction) {
                lastPrediction = data.prediction;
                
                const bubble = document.createElement('div');
                bubble.className = 'chat-bubble';
                bubble.innerText = data.prediction;
                chatContainer.appendChild(bubble);
                chatContainer.scrollTop = chatContainer.scrollHeight;

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(data.prediction);
                window.speechSynthesis.speak(utterance);

                // Clear prediction after 3 seconds so you can sign it again
                clearTimeout(predictionTimeout);
                predictionTimeout = setTimeout(() => { lastPrediction = ""; }, 3000);
            }
        };

        // 3. MediaPipe Hands Setup
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({ 
            maxNumHands: 2, 
            modelComplexity: 1, 
            minDetectionConfidence: 0.5, 
            minTrackingConfidence: 0.5 
        });

        // 4. Processing Loop
        hands.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            let allLandmarks = new Array(126).fill(0); 

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    if (index < 2) { 
                        // Draw the skeleton on screen
                        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#38bdf8', lineWidth: 4});
                        drawLandmarks(canvasCtx, landmarks, {color: '#fbbf24', lineWidth: 1, radius: 2});
                        
                        // Flatten landmarks for the AI
                        const coords = landmarks.map(l => [l.x, l.y, l.z]).flat();
                        allLandmarks.splice(index * 63, 63, ...coords);
                    }
                });
            }

            // ALWAYS send data, even if it's zeros (The "Logical Gate" depends on this)
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({landmarks: allLandmarks}));
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
